spring:
  application:
    name: yuoj-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    store-type: ${SESSION_STORE_TYPE:redis}
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/themeweek}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  redis:
    database: ${REDIS_DB:1}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 5000
    password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: ${PORT:8121}
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: ${MYBATIS_LOG:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
wx:
  mp:
    token: ${WX_TOKEN:xxx}
    aesKey: ${WX_AES_KEY:xxx}
    appId: ${WX_APP_ID:xxx}
    secret: ${WX_SECRET:xxx}
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  open:
    appId: ${WX_OPEN_APP_ID:xxx}
    appSecret: ${WX_OPEN_APP_SECRET:xxx}
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:xxx}
    secretKey: ${COS_SECRET_KEY:xxx}
    region: ${COS_REGION:xxx}
    bucket: ${COS_BUCKET:xxx}
codesandbox:
  type: remote
