<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f5f0e6"/>
  
  <!-- 木纹桌面 -->
  <rect width="800" height="400" y="200" fill="#d4a76a"/>
  <rect width="800" height="400" y="200" fill="url(#woodgrain)" opacity="0.3"/>
  
  <!-- 咖啡杯 -->
  <ellipse cx="400" cy="350" rx="100" ry="40" fill="#ffffff" stroke="#8b4513" stroke-width="3"/>
  <ellipse cx="400" cy="350" rx="80" ry="30" fill="#8b4513"/>
  <ellipse cx="400" cy="345" rx="75" ry="25" fill="#d2691e"/>
  <ellipse cx="400" cy="340" rx="70" ry="20" fill="#cd853f"/>
  
  <!-- 心形拉花 -->
  <path d="M385 335 C380 325, 390 320, 400 325 C410 320, 420 325, 415 335 C410 345, 390 345, 385 335" fill="#ffffff" opacity="0.8"/>
  
  <!-- 杯柄 -->
  <path d="M500 330 C520 330, 530 350, 530 370 C530 390, 520 410, 500 410" fill="none" stroke="#8b4513" stroke-width="10"/>
  
  <!-- 笔记本电脑 -->
  <rect x="200" y="250" width="200" height="120" fill="#333333" rx="5"/>
  <rect x="210" y="260" width="180" height="100" fill="#87ceeb"/>
  <rect x="200" y="370" width="200" height="10" fill="#555555" rx="3"/>
  <rect x="205" y="365" width="190" height="15" fill="#777777" rx="2"/>
  
  <!-- 羊角面包 -->
  <path d="M550 350 C540 340, 560 330, 580 335 C600 340, 610 355, 605 370 C600 385, 580 390, 560 385 C540 380, 530 365, 535 350 C540 335, 560 330, 580 335" fill="#f4a460"/>
  <path d="M550 350 C545 345, 555 340, 565 345 C575 350, 580 358, 575 365 C570 372, 555 375, 545 370 C535 365, 530 358, 535 350" fill="#daa520" opacity="0.5"/>
  
  <!-- 木纹滤镜 -->
  <defs>
    <pattern id="woodgrain" width="100" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 0 Q25 5, 50 0 Q75 15, 100 10" fill="none" stroke="#a0522d" stroke-width="1"/>
      <path d="M0 10 Q25 15, 50 10 Q75 25, 100 20" fill="none" stroke="#a0522d" stroke-width="1"/>
    </pattern>
  </defs>
</svg>